<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukáš Kus | Motion Artist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Container pro zmenšovací efekt */
        .hero-wrapper { height: 200vh; position: relative; } /* 200vh vytvoří prostor pro skrolování */
        
        .sticky-container {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #hero-video-box {
            width: 100%;
            height: 100%;
            transition: border-radius 0.5s ease;
            overflow: hidden;
            position: relative;
            will-change: transform;
        }

        .hero-video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        /* Bento Styling */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 300px;
            gap: 1.5rem;
        }

        .bento-item {
            background: #111;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2rem;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .bento-item:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="hero-wrapper">
        <div class="sticky-container">
            <div id="hero-video-box" class="flex items-center justify-center">
                <video autoplay muted loop playsinline class="hero-video-bg">
                    <source src="showreel_preview.mp4" type="video/mp4">
                </video>
                
                <div id="hero-text" class="absolute z-20 text-center">
                    <h1 class="text-6xl md:text-[8rem] font-black italic uppercase leading-none tracking-tighter">Motion Artist</h1>
                    <p class="text-gray-400 tracking-[0.4em] uppercase text-sm mt-4 italic">Lukáš Kus</p>
                </div>
                
                <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60 z-10"></div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto py-20 px-6">
        <div class="reveal mb-16 text-center">
            <h2 class="text-4xl font-black uppercase italic tracking-tighter">Selected Disciplines</h2>
        </div>

        <div class="bento-grid">
            <div class="bento-item col-span-4 md:col-span-2 row-span-2 reveal group">
                <h3 class="text-2xl font-bold italic mb-2">Animations</h3>
                <p class="text-gray-500 text-sm mb-6 uppercase tracking-widest">Lottie & UI Motion</p>
                <div class="w-full h-full flex items-center justify-center">
                    <dotlottie-player src="https://lottie.host/your-animation.json" background="transparent" speed="1" class="w-64" loop autoplay></dotlottie-player>
                </div>
            </div>

            <div class="bento-item col-span-4 md:col-span-2 row-span-1 reveal group">
                <h3 class="text-2xl font-bold italic mb-2">3D Worlds</h3>
                <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover opacity-30 group-hover:opacity-50 transition">
                    <source src="3d_clip.mp4" type="video/mp4">
                </video>
                <p class="relative z-10 text-gray-400 text-xs uppercase tracking-widest">Cinema 4D / Octane</p>
            </div>

            <div class="bento-item col-span-2 md:col-span-1 reveal">
                <h3 class="text-xl font-bold italic">Lab</h3>
                <p class="text-gray-600 text-[10px] uppercase mt-2">RnD Experiments</p>
            </div>
            
            <div class="bento-item col-span-2 md:col-span-1 reveal flex flex-col justify-between">
                <h3 class="text-xl font-bold italic">Contact</h3>
                <a href="mailto:lukaskus.motion@gmail.com" class="text-[10px] text-white underline">EMAIL ME</a>
            </div>
        </div>
    </main>

    <footer class="py-20 text-center opacity-50 text-[10px] tracking-[0.5em] uppercase">
        © 2026 Lukáš Kus — Motion Designer
    </footer>

    <script>
        // SCRIPT PRO ZMENŠOVÁNÍ VIDEA
        window.addEventListener('scroll', () => {
            const videoBox = document.getElementById('hero-video-box');
            const heroText = document.getElementById('hero-text');
            const scrollValue = window.scrollY;
            
            // Výpočet zmenšení (z 1 na 0.5)
            // Zastaví se na 50% (0.5) po 500px skrolu
            let scale = 1 - (scrollValue / 1000);
            if (scale < 0.5) scale = 0.5;
            
            // Výpočet kulatosti rohů
            let radius = (scrollValue / 10);
            if (radius > 40) radius = 40; // Max 40px

            // Výpočet průhlednosti textu (zmizí dřív)
            let opacity = 1 - (scrollValue / 300);
            if (opacity < 0) opacity = 0;

            videoBox.style.transform = `scale(${scale})`;
            videoBox.style.borderRadius = `${radius}px`;
            heroText.style.opacity = opacity;
        });

        // REVEAL SCRIPT
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            reveals.forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    el.classList.add("active");
                }
            });
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>

</body>
</html>
