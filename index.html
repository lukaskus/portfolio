<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukas Kus | Motion Designer & Video Producer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #050505; --accent: #ff5c00; --panel: #111; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* TOBIAS GRAIN */
        .noise {
            position: fixed; top: -100%; left: -100%; width: 300%; height: 300%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png');
            opacity: 0.04; pointer-events: none; z-index: 9999;
            animation: noise-anim 0.5s steps(3) infinite;
        }
        @keyframes noise-anim {
            0% { transform: translate(0,0) }
            10% { transform: translate(-5%,-5%) }
            50% { transform: translate(-10%,5%) }
            100% { transform: translate(5%,0) }
        }

        /* NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: 2.5rem 0; mix-blend-mode: difference;
        }
        .nav-link {
            font-size: 0.75rem; font-weight: 400; letter-spacing: 0.2em;
            text-transform: uppercase; color: #fff; transition: opacity 0.4s;
            display: inline-block;
        }
        .nav-link:hover { opacity: 0.5; }
        .nav-contact { color: var(--accent) !important; opacity: 1 !important; }

        /* HERO SECTION */
        .hero { height: 180vh; position: relative; }
        .sticky-hero {
            position: sticky; top: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #main-stage {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--panel);
            will-change: transform, border-radius;
            transition: border-radius 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hero-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        /* TEXT REVEAL ANIMATION */
        .reveal { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); display: inline-block; }
        .reveal .reveal-inner {
            display: block; transform: translateY(105%);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active .reveal-inner { transform: translateY(0); }

        /* MULTILINE REVEAL (pro Intro text) */
        .reveal-line { overflow: hidden; display: block; }
        .reveal-line span {
            display: block; transform: translateY(110%);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-wrapper.active .reveal-line span { transform: translateY(0); }
        /* Zpoždění pro jednotlivé řádky */
        .reveal-wrapper.active .reveal-line:nth-child(1) span { transition-delay: 0s; }
        .reveal-wrapper.active .reveal-line:nth-child(2) span { transition-delay: 0.1s; }
        .reveal-wrapper.active .reveal-line:nth-child(3) span { transition-delay: 0.2s; }

        /* SLIDER SETTINGS - Pouze scroll */
        .work-swiper { cursor: default !important; }
        .swiper-slide { opacity: 0.15; transition: opacity 0.8s ease; }
        .swiper-slide-active { opacity: 1 !important; }
        .swiper-slide-next { opacity: 0.5 !important; }

        .work-card { width: 100%; height: 100%; background: var(--panel); border-radius: 2rem; overflow: hidden; }
        .work-video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="noise"></div>

    <nav>
        <div class="max-w-[1800px] mx-auto px-10 flex justify-between items-start">
            <div class="flex flex-col">
                <span class="text-xl md:text-2xl font-black italic uppercase tracking-tighter leading-none">Lukas Kus</span>
                <span class="text-[8px] md:text-[9px] tracking-[0.4em] text-zinc-400 uppercase mt-2">Motion Designer & Video Producer</span>
            </div>
            <div class="flex space-x-12 items-center mt-2">
                <a href="#work" class="nav-link">WORK</a>
                <a href="#play" class="nav-link">PLAY</a>
                <a href="#contact" class="nav-link nav-contact">CONTACT</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="sticky-hero">
            <div id="main-stage">
                <video autoplay muted loop playsinline class="hero-video absolute inset-0">
                    <source src="showreel-preview.mp4" type="video/mp4">
                </video>
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent pointer-events-none"></div>
            </div>
        </div>
    </section>

    <main class="relative z-20">
        
        <section class="px-10 md:px-20 pt-20 pb-10">
            <div class="max-w-6xl reveal-wrapper">
                <h2 class="text-3xl md:text-6xl lg:text-7xl font-light leading-[1.15] text-zinc-400">
                    <span class="reveal-line"><span>I help brands <span class="text-white italic font-normal">move</span></span></span>
                    <span class="reveal-line"><span>through high-end motion design</span></span>
                    <span class="reveal-line"><span>and strategic video production.</span></span>
                </h2>
            </div>
        </section>

        <section id="work" class="py-24">
            <div class="px-10 md:px-20 mb-16">
                <div class="reveal">
                    <h2 class="text-7xl font-black italic uppercase tracking-tighter reveal-inner">Selected Work</h2>
                </div>
            </div>

            <div class="swiper work-swiper w-full">
                <div class="swiper-wrapper">
                    
                    <div class="swiper-slide !w-[85%] md:!w-[65%] aspect-video">
                        <div class="work-card ml-10 md:ml-20">
                            <video autoplay muted loop playsinline class="work-video">
                                <source src="1-click Property.mp4" type="video/mp4">
                            </video>
                        </div>
                    </div>

                    <div class="swiper-slide !w-[85%] md:!w-[65%] aspect-video">
                        <div class="work-card">
                            <video autoplay muted loop playsinline class="work-video">
                                <source src="Main Video 1.02-Vo.mp4" type="video/mp4">
                            </video>
                        </div>
                    </div>

                    <div class="swiper-slide !w-[85%] md:!w-[65%] aspect-video">
                        <div class="work-card mr-10 md:mr-20 flex items-center justify-center">
                            <span class="text-zinc-800 uppercase tracking-widest text-xs italic">Next Project Coming Soon</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="play" class="px-10 md:px-20 py-32 border-t border-white/5">
            <div class="reveal mb-20">
                <h2 class="text-5xl font-black italic uppercase tracking-tighter reveal-inner">Playground</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="aspect-square work-card !bg-[#0a0a0a]"></div>
                <div class="aspect-square work-card !bg-[#0a0a0a]"></div>
                <div class="aspect-square work-card !bg-[#0a0a0a]"></div>
            </div>
        </section>

    </main>

    <footer id="contact" class="py-60 text-center relative border-t border-white/5">
        <div class="absolute top-10 right-10 text-right hidden md:block">
            <p class="text-[--accent] text-sm font-medium">• Available from April 7th, 2026</p>
        </div>
        <div class="reveal mb-8">
            <p class="text-[10px] tracking-[0.6em] text-zinc-600 uppercase reveal-inner">Let's build together</p>
        </div>
        <a href="mailto:lukaskus.motion@gmail.com" class="text-3xl md:text-8xl font-black uppercase italic tracking-tighter hover:text-zinc-500 transition-colors">
            lukaskus.motion@gmail.com
        </a>
    </footer>

    <script>
        // Smooth Scroll
        const lenis = new Lenis({ lerp: 0.1 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Hero Animation
        const stage = document.getElementById('main-stage');
        lenis.on('scroll', (e) => {
            const scroll = window.scrollY;
            let scale = 1 - (scroll / 2000);
            if (scale < 0.45) scale = 0.45;
            let radius = scroll / 8;
            if (radius > 80) radius = 80;
            stage.style.transform = `scale(${scale})`;
            stage.style.borderRadius = `${radius}px`;
        });

        // Work Slider - Pouze mousewheel
        const swiper = new Swiper('.work-swiper', {
            slidesPerView: 'auto',
            spaceBetween: 50,
            centeredSlides: false,
            grabCursor: false,
            allowTouchMove: false,
            speed: 1000,
            mousewheel: {
                forceToAxis: true,
                sensitivity: 1,
                releaseOnEdges: true,
            },
        });

        // Reveal Animations (pro nadpisy i multiline text)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        
        document.querySelectorAll('.reveal, .reveal-wrapper').forEach(el => observer.observe(el));

        // Magnetic Menu
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('mousemove', (e) => {
                const { offsetX, offsetY, target } = e;
                const { clientWidth, clientHeight } = target;
                const x = (offsetX - clientWidth / 2) / 3;
                const y = (offsetY - clientHeight / 2) / 3;
                link.style.transform = `translate(${x}px, ${y}px)`;
            });
            link.addEventListener('mouseleave', () => { link.style.transform = `translate(0, 0)`; });
        });
    </script>
</body>
</html>
