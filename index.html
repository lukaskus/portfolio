<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukas Kus | Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #050505; --accent: #ff5c00; --panel: #111; }
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        .site-container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 2rem 0; mix-blend-mode: difference; }

        /* HERO STAGE */
        #main-stage {
            width: 100vw; height: 100vh; overflow: hidden; position: relative;
            transform-origin: center center; will-change: transform, border-radius;
        }
        #main-stage video { width: 100%; height: 100%; object-fit: cover; }

        /* MASKA FOTKY */
        .profile-masked {
            width: 100%; height: 100%; object-fit: cover;
            mask-image: url('#profileMask'); -webkit-mask-image: url('#profileMask');
            mask-size: contain; mask-repeat: no-repeat; mask-position: center;
        }

        /* SWIPER */
        .work-swiper { width: 100%; padding-left: max(24px, calc((100vw - 1400px) / 2 + 24px)); overflow: visible; }
        .swiper-slide { opacity: 0.1; transition: opacity 0.6s ease; }
        .swiper-slide-active { opacity: 1 !important; }
        .custom-next-btn {
            position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 50; background: rgba(5,5,5,0.5);
        }

        /* BENTO GRID */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media (min-width: 768px) { .bento-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .work-card { background: var(--panel); border-radius: 12px; overflow: hidden; }
        .work-video { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .card-sq { aspect-ratio: 1 / 1; }
        .card-vid { aspect-ratio: 16 / 9; grid-column: span 2; }
        .card-vert { aspect-ratio: 9 / 16; grid-row: span 2; }

        .reveal-up { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal-up.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <mask id="profileMask" maskUnits="objectBoundingBox" maskContentUnits="objectBoundingBox">
                <path d="M0.5,0.062 C0.575,0.062,0.638,0.111,0.697,0.16 C0.756,0.209,0.811,0.258,0.86,0.317 C0.909,0.376,0.938,0.439,0.938,0.5 C0.938,0.561,0.909,0.624,0.86,0.683 C0.811,0.742,0.756,0.791,0.697,0.84 C0.638,0.889,0.575,0.938,0.5,0.938 C0.425,0.938,0.362,0.889,0.303,0.84 C0.244,0.791,0.189,0.742,0.14,0.683 C0.091,0.624,0.062,0.561,0.062,0.5 C0.062,0.439,0.091,0.376,0.14,0.317 C0.189,0.258,0.244,0.209,0.303,0.16 C0.362,0.111,0.425,0.062,0.5,0.062 Z" fill="white"/>
            </mask>
        </defs>
    </svg>

    <nav>
        <div class="site-container flex justify-between items-start">
            <div>
                <span class="text-xl font-black italic uppercase block leading-none">Lukas Kus</span>
                <span class="text-[8px] tracking-[0.3em] text-zinc-500 uppercase">Motion Designer & Video Producer</span>
            </div>
            <div class="hidden md:flex space-x-8 text-[10px] tracking-widest mt-1">
                <a href="#work">WORK</a>
                <a href="#play">PLAY</a>
                <a href="mailto:lukaskus.motion@gmail.com" style="color:var(--accent)">CONTACT</a>
            </div>
        </div>
    </nav>

    <section class="h-[120vh] relative">
        <div class="sticky top-0 h-screen w-full flex items-center justify-center overflow-hidden">
            <div id="main-stage">
                <video autoplay muted loop playsinline class="opacity-60">
                    <source src="showreel-preview.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <main class="relative z-10 bg-[#050505]">
        <section class="py-40 site-container">
            <div class="grid md:grid-cols-[1fr,2fr] gap-16 items-center reveal-up">
                <div class="aspect-square w-full max-w-[400px] mx-auto">
                    <img src="lukaskus-photo.jpg" alt="Lukas Kus" class="profile-masked">
                </div>
                <div>
                    <h2 class="text-4xl md:text-6xl font-light text-zinc-500 leading-tight italic">
                        Based in Prague, creating for the world. <br>
                        <span class="text-white not-italic font-bold">10+ years</span> of making things <span class="text-white italic font-black">move</span>, <br>
                        exploring AI, and <span class="text-white not-italic font-bold">generally being awesome.</span>
                    </h2>
                </div>
            </div>
        </section>

        <section id="work" class="py-24 relative overflow-hidden">
            <div class="site-container mb-12"><h2 class="text-6xl font-black italic uppercase tracking-tighter">Selected Work</h2></div>
            <div class="swiper work-swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide !w-[85%] md:!w-[70%]"><div class="work-card aspect-video"><video muted loop playsinline class="work-video"><source src="1-click Property.mp4" type="video/mp4"></video></div></div>
                    <div class="swiper-slide !w-[85%] md:!w-[70%]"><div class="work-card aspect-video"><video muted loop playsinline class="work-video"><source src="Main Video 1.02-Vo.mp4" type="video/mp4"></video></div></div>
                    <div class="swiper-slide !w-[85%] md:!w-[70%]"><div class="work-card aspect-video"><video muted loop playsinline class="work-video"><source src="boards.mp4" type="video/mp4"></video></div></div>
                </div>
            </div>
            <div class="custom-next-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
        </section>

        <section id="play" class="py-32 site-container">
            <h2 class="text-6xl font-black italic uppercase mb-16 tracking-tighter">Playground</h2>
            <div class="bento-grid">
                <div class="work-card card-sq reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/botte-secrete-1.mp4" type="video/mp4"></video></div>
                <div class="work-card card-sq reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/UGC.mp4" type="video/mp4"></video></div>
                <div class="work-card card-vert reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/platform-01.mp4" type="video/mp4"></video></div>
                <div class="work-card card-sq reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/3D-2.mp4" type="video/mp4"></video></div>
                
                <div class="work-card card-vid reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/Stoix.mp4" type="video/mp4"></video></div>
                <div class="work-card card-sq reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/rr.mp4" type="video/mp4"></video></div>

                <div class="work-card card-vid reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/CNN.mp4" type="video/mp4"></video></div>
                <div class="work-card card-vert reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/platform-02.mp4" type="video/mp4"></video></div>
                
                <div class="work-card card-sq reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/3D-tube.mp4" type="video/mp4"></video></div>
                <div class="work-card card-sq reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/Sportlito-01.mp4" type="video/mp4"></video></div>
                <div class="work-card card-sq reveal-up"><video autoplay muted loop playsinline class="work-video"><source src="playground/vanguard.mp4" type="video/mp4"></video></div>
            </div>
        </section>
    </main>

    <footer class="py-40 site-container text-center reveal-up">
        <p class="text-zinc-600 text-[10px] tracking-[0.5em] uppercase mb-4">Let's build together</p>
        <a href="mailto:lukaskus.motion@gmail.com" class="text-4xl md:text-7xl font-black italic uppercase break-all hover:text-zinc-400 transition-colors">lukaskus.motion@gmail.com</a>
        <p class="mt-12 text-zinc-800 text-[10px] tracking-widest">• Available from April 7th, 2026</p>
    </footer>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal-up').forEach(el => observer.observe(el));

        const workSwiper = new Swiper('.work-swiper', {
            slidesPerView: 'auto', spaceBetween: 30, speed: 800, loop: true,
            navigation: { nextEl: '.custom-next-btn' },
            on: {
                slideChange: function() {
                    this.slides.forEach(s => { const v = s.querySelector('video'); if(v) v.pause(); });
                    const activeV = this.slides[this.activeIndex].querySelector('video');
                    if(activeV) activeV.play();
                }
            }
        });

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const stage = document.getElementById('main-stage');
            if (stage) {
                const progress = Math.min(scroll / 600, 1);
                const scale = 1 - (progress * 0.1); 
                const radius = progress * 40;
                stage.style.transform = `scale(${scale})`;
                stage.style.borderRadius = `${radius}px`;
            }
        });
    </script>
</body>
</html>
