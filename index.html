<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukas Kus | Motion Artist</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }

        /* TOBIAS-STYLE GRAIN OVERLAY */
        .noise-overlay {
            position: fixed;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png');
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
            animation: noise 0.5s steps(2) infinite;
        }
        @keyframes noise {
            0% { transform: translate(0,0) }
            10% { transform: translate(-5%, -5%) }
            20% { transform: translate(-10%, 5%) }
            40% { transform: translate(5%, -10%) }
            60% { transform: translate(-15%, 5%) }
            80% { transform: translate(10%, 10%) }
            100% { transform: translate(5%, 0) }
        }

        /* CLIP-PATH REVEAL (Vynoření textu) */
        .reveal-text {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            display: inline-block;
        }
        .reveal-text span {
            display: block;
            transform: translateY(110%);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-text.active span { transform: translateY(0); }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
            padding: 3.5rem 0;
        }
        .nav-link {
            font-size: 1.1rem; font-weight: 900; letter-spacing: 0.2em;
            text-transform: uppercase; color: #444; transition: color 0.4s ease;
        }
        .nav-link:hover { color: #fff; }

        /* Hero Engine */
        .hero-wrapper { height: 180vh; position: relative; }
        .sticky-container {
            position: sticky; top: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        #hero-video-box {
            width: 100%; height: 100%; overflow: hidden;
            will-change: transform, opacity;
            transition: transform 0.1s linear, border-radius 0.6s ease;
        }
        .hero-video-bg { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .content-section { padding: 150px 2rem; max-width: 1400px; margin: 0 auto; }
        .work-card { border-radius: 2.5rem; background: #0a0a0a; border: 1px solid #111; overflow: hidden; }

        /* Magnetic Button Feel */
        .btn-magnetic { transition: transform 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <nav>
        <div class="max-w-7xl mx-auto px-10 flex justify-center space-x-12 md:space-x-24">
            <a href="#product-videos" class="nav-link">Product</a>
            <a href="#lotties" class="nav-link">Lotties</a>
            <a href="#3d" class="nav-link">3D</a>
            <a href="#playground" class="nav-link">Playground</a>
        </div>
    </nav>

    <div class="hero-wrapper">
        <div class="sticky-container">
            <div id="hero-video-box">
                <video autoplay muted loop playsinline class="hero-video-bg">
                    <source src="showreel_preview.mp4" type="video/mp4">
                </video>
                <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-transparent z-10"></div>
            </div>
        </div>
    </div>

    <main>
        <section id="product-videos" class="content-section">
            <div class="reveal-text mb-16">
                <h2 class="text-6xl font-black italic uppercase tracking-tighter italic"><span>Selected Work</span></h2>
            </div>
            
            <div class="grid grid-cols-1 gap-16">
                <div class="work-card aspect-video">
                    <video autoplay muted loop playsinline class="w-full h-full object-cover">
                        <source src="Main Video 1.02-Vo.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>

        <section id="lotties" class="content-section">
            <div class="reveal-text mb-12">
                <h3 class="text-4xl font-black italic uppercase italic"><span>Motion UI & Lottie</span></h3>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-zinc-800 text-[10px] tracking-[0.5em] uppercase">
                <div class="work-card aspect-square flex items-center justify-center">
                    <dotlottie-player src="https://lottie.host/your-animation.json" background="transparent" speed="1" class="w-2/3" loop autoplay></dotlottie-player>
                </div>
                <div class="work-card aspect-square flex items-center justify-center border-dashed border-zinc-900">Next Case</div>
                <div class="work-card aspect-square flex items-center justify-center border-dashed border-zinc-900">Next Case</div>
            </div>
        </section>
    </main>

    <footer class="py-60 text-center border-t border-white/5">
        <div class="reveal-text mb-6">
            <p class="text-xs tracking-[0.6em] text-zinc-500 uppercase italic"><span>Available for new projects</span></p>
        </div>
        <br>
        <a href="mailto:lukaskus.motion@gmail.com" class="text-3xl md:text-6xl font-black uppercase italic tracking-tighter hover:text-zinc-400 transition-colors">lukaskus.motion@gmail.com</a>
    </footer>

    <script>
        // 1. SMOOTH SCROLL (LENIS)
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 2. HERO SCALE & FADE
        const videoBox = document.getElementById('hero-video-box');
        lenis.on('scroll', (e) => {
            const scroll = window.scrollY;
            
            // Scale and Radius
            let scale = 1 - (scroll / 1500);
            if (scale < 0.35) scale = 0.35;
            
            let opacity = 0.6 - (scroll / 1000);
            if (opacity < 0.1) opacity = 0.1;

            let radius = scroll / 10;
            if (radius > 80) radius = 80;

            videoBox.style.transform = `scale(${scale})`;
            videoBox.style.opacity = opacity;
            videoBox.style.borderRadius = `${radius}px`;
        });

        // 3. TEXT REVEAL OBSERVER
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal-text').forEach(text => observer.observe(text));
    </script>
</body>
</html>
