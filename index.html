<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Designer | Portfolio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .video-container { height: 80vh; overflow: hidden; position: relative; }
    </style>
</head>
<body>

    <section class="relative w-full min-h-screen flex flex-col items-center justify-center px-6">
        <div class="video-container w-full max-w-6xl rounded-2xl border border-white/10 shadow-2xl relative">
            <video autoplay muted loop playsinline class="w-full h-full object-cover opacity-80">
                <source src="showreel_preview.mp4" type="video/mp4">
            </video>
            
            <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/40">
                <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-4 italic uppercase">Motion Artist</h1>
                <p class="text-lg md:text-xl text-gray-300 font-light tracking-widest uppercase">Visualizing ideas in 2D, 3D & Beyond</p>
                <button class="mt-8 px-8 py-4 bg-white text-black font-bold rounded-full hover:scale-110 transition-transform">
                    PLAY SHOWREEL
                </button>
            </div>
        </div>
        <div class="mt-12 opacity-50 animate-bounce">↓ SCROLL TO EXPLORE</div>
    </section>

    <section class="max-w-7xl mx-auto py-20 px-6">
        <h2 class="text-3xl font-bold mb-10 border-l-4 border-white pl-4 uppercase">Playground & Lottie</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-zinc-900 rounded-xl p-4 aspect-square flex items-center justify-center border border-zinc-800 hover:border-zinc-500 transition">
                <dotlottie-player src="https://lottie.host/your-animation.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
            </div>
            <div class="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800">
                <img src="static-visual.jpg" alt="Visual" class="w-full h-full object-cover">
            </div>
            </div>
    </section>

</body>
</html>
