<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Artist | Portfolio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Animace pro "Zážitek" */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hero Video Fullscreen */
        .hero-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
    </style>
</head>
<body>

    <section class="relative w-full h-screen flex items-center justify-center overflow-hidden">
        <video autoplay muted loop playsinline class="hero-video-bg opacity-60">
            <source src="showreel_preview.mp4" type="video/mp4">
        </video>

        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-black/30 z-10"></div>
        
        <div class="relative z-20 text-center px-6">
            <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-4 italic uppercase leading-none">
                Motion Artist
            </h1>
            <p class="text-sm md:text-xl text-gray-300 font-light tracking-[0.3em] uppercase mb-8">
                Visualizing ideas in 2D, 3D & Beyond
            </p>
            <button class="px-10 py-4 bg-white text-black font-bold rounded-full hover:scale-110 transition-transform duration-300 shadow-xl">
                PLAY SHOWREEL
            </button>
        </div>

        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 opacity-40 animate-bounce text-xs tracking-widest uppercase">
            ↓ Scroll to explore
        </div>
    </section>

    <section class="max-w-7xl mx-auto py-32 px-6">
        <div class="reveal">
            <h2 class="text-4xl font-bold mb-2 uppercase tracking-tight">Visual Playground</h2>
            <div class="h-1 w-20 bg-white mb-12"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="reveal bg-zinc-900 aspect-square rounded-2xl flex items-center justify-center border border-white/5 hover:border-white/20 transition group overflow-hidden">
                <dotlottie-player src="https://lottie.host/your-animation.json" background="transparent" speed="1" class="w-full h-full" loop autoplay></dotlottie-player>
            </div>

            <div class="reveal bg-zinc-900 aspect-square rounded-2xl overflow-hidden border border-white/5 group">
                <img src="render.jpg" alt="3D Render" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
            </div>

            <div class="reveal bg-zinc-900 aspect-square rounded-2xl overflow-hidden border border-white/5 relative group">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex items-center justify-center">
                   <span class="text-sm font-bold tracking-widest uppercase">3D Simulation</span>
                </div>
                <video autoplay muted loop playsinline class="w-full h-full object-cover">
                    <source src="3d_clip.mp4" type="video/mp4">
                </video>
            </div>

        </div>
    </section>

    <footer class="py-20 text-center border-t border-white/10">
        <div class="reveal">
            <p class="text-gray-500 uppercase tracking-widest mb-4 text-sm">Let's build something together</p>
            <a href="mailto:tvuj@email.cz" class="text-3xl md:text-5xl font-bold hover:text-zinc-400 transition-colors">hello@motionartist.com</a>
        </div>
    </footer>

    <script>
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            reveals.forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                const elementVisible = 100;
                if (elementTop < windowHeight - elementVisible) {
                    el.classList.add("active");
                }
            });
        }
        window.addEventListener("scroll", reveal);
        // Spustit jednou při načtení
        reveal();
    </script>

</body>
</html>
